<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZ Slang Quiz</title>
<script>
  // Apply saved theme before first paint to avoid a flash. Default: light.
  (function () {
    try {
      var saved = localStorage.getItem("slangquiz-theme");
      if (saved === "dark") document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  })();
</script>
<style>
  /* Light theme — default */
  :root {
    --bg: #f3f5fb;
    --bg-glow-1: rgba(76,201,240,.18);
    --bg-glow-2: rgba(247,37,133,.12);
    --card: #ffffff;
    --card-2: #f7f9ff;
    --ink: #161a33;
    --muted: #626b8c;
    --accent: #1f8fd0;
    --accent-2: #db2777;
    --good: #16a34a;
    --bad: #e11d48;
    --line: #e3e8f4;
    --fill: rgba(22,30,70,.04);
    --fill-hover: rgba(22,30,70,.09);
    --shadow: 0 14px 40px rgba(30,45,100,.10);
  }
  /* Dark theme */
  [data-theme="dark"] {
    --bg: #0f1226;
    --bg-glow-1: rgba(42,47,99,.9);
    --bg-glow-2: rgba(58,17,69,.9);
    --card: #1a1f3d;
    --card-2: #232a52;
    --ink: #eef1ff;
    --muted: #9aa3c7;
    --accent: #4cc9f0;
    --accent-2: #f72585;
    --good: #2ecc71;
    --bad: #ff5d73;
    --line: #2e356a;
    --fill: rgba(255,255,255,.045);
    --fill-hover: rgba(255,255,255,.09);
    --shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 80% -10%, var(--bg-glow-1) 0%, transparent 60%),
                radial-gradient(900px 500px at -10% 110%, var(--bg-glow-2) 0%, transparent 55%),
                var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
    transition: background .25s ease, color .25s ease;
  }
  .wrap { width: 100%; max-width: 640px; }
  header { text-align: center; margin-bottom: 18px; }
  h1 {
    margin: 0 0 4px;
    font-size: 30px;
    letter-spacing: .5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin: 0; }

  .card {
    background: linear-gradient(180deg, var(--card), var(--card-2));
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 22px;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat {
    flex: 1;
    background: var(--fill);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .stat.good .num { color: var(--good); }
  .stat.bad .num { color: var(--bad); }

  .progress {
    height: 8px;
    background: var(--fill);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .progress > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .35s ease;
  }

  .qmeta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .chip {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border: 1px solid var(--line);
    background: rgba(76,201,240,.08);
    padding: 4px 10px;
    border-radius: 99px;
  }
  .qnum { font-size: 12px; color: var(--muted); }

  .prompt { font-size: 15px; color: var(--muted); margin: 4px 0 2px; }
  .term {
    font-size: 34px;
    font-weight: 800;
    margin: 0 0 18px;
    word-break: break-word;
  }

  .options { display: grid; gap: 10px; }
  .opt {
    text-align: left;
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--fill);
    color: var(--ink);
    font-size: 16px;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease, border-color .15s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .opt:hover:not(:disabled) { background: var(--fill-hover); transform: translateY(-1px); }
  .opt:disabled { cursor: default; }
  .opt .key {
    flex: 0 0 26px;
    height: 26px;
    border-radius: 7px;
    background: var(--fill-hover);
    display: grid;
    place-items: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
  }
  .opt.correct { background: rgba(46,204,113,.16); border-color: var(--good); }
  .opt.correct .key { background: var(--good); color: #062d18; }
  .opt.wrong { background: rgba(255,93,115,.14); border-color: var(--bad); }
  .opt.wrong .key { background: var(--bad); color: #3a0008; }

  /* Hint (reveal example before answering) */
  .hint { margin-top: 14px; }
  .hint.hidden { display: none; }
  .hint-btn {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px dashed var(--line);
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .hint-btn:hover { background: var(--fill); color: var(--ink); border-color: var(--accent); }
  .hint-text {
    display: none;
    background: var(--fill);
    border-left: 3px solid var(--accent);
    padding: 10px 12px;
    border-radius: 8px;
    font-style: italic;
    color: var(--ink);
  }
  .hint-text.show { display: block; }
  .hint-text .lbl { font-style: normal; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); display: block; margin-bottom: 3px; }
  .hint-text .mask { font-style: normal; font-weight: 700; color: var(--accent); letter-spacing: 1px; }

  .reveal {
    margin-top: 16px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
    display: none;
  }
  .reveal.show { display: block; }
  .reveal .verdict { font-weight: 700; margin-bottom: 6px; }
  .reveal .verdict.good { color: var(--good); }
  .reveal .verdict.bad { color: var(--bad); }
  .reveal .example {
    background: var(--fill);
    border-left: 3px solid var(--accent);
    padding: 10px 12px;
    border-radius: 8px;
    font-style: italic;
    color: var(--ink);
    margin-top: 6px;
  }
  .reveal .example .lbl { font-style: normal; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); display: block; margin-bottom: 3px; }
  .dict-link {
    display: inline-block;
    margin-top: 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .dict-link:hover { border-bottom-color: var(--accent); }

  .actions { margin-top: 16px; display: flex; gap: 10px; }
  button.btn {
    flex: 1;
    padding: 13px 16px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #04122a;
  }
  button.btn.ghost {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    flex: 0 0 auto;
  }
  button.btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Setup / start screen */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  select, .field select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    background: var(--card-2);
    color: var(--ink);
    border: 1px solid var(--line);
    font-size: 15px;
  }
  .hidden { display: none !important; }

  /* Results */
  .result { text-align: center; }
  .result .big {
    font-size: 56px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .result .msg { font-size: 18px; margin: 4px 0 18px; }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
  footer a { color: var(--accent); text-decoration: none; }

  /* Theme toggle */
  .theme-toggle {
    position: absolute;
    top: 22px;
    right: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 6px 12px 6px 10px;
    cursor: pointer;
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    box-shadow: var(--shadow);
  }
  .theme-toggle .track {
    width: 34px; height: 18px;
    border-radius: 99px;
    background: var(--fill-hover);
    position: relative;
    transition: background .2s ease;
  }
  .theme-toggle .knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: transform .2s ease;
  }
  [data-theme="dark"] .theme-toggle .knob { transform: translateX(16px); }
  @media (max-width: 520px) {
    .theme-toggle .label { display: none; }
    .theme-toggle { top: 16px; right: 12px; }
  }

  /* Dictionary popup */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,10,25,.6);
    backdrop-filter: blur(3px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 50;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    width: 100%;
    max-width: 540px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }
  .modal-head h3 { margin: 0; font-size: 17px; }
  .modal-close {
    border: none;
    background: var(--fill);
    color: var(--ink);
    width: 30px; height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .modal-close:hover { background: var(--fill-hover); }
  .modal-body { padding: 16px 18px; overflow-y: auto; }
  .modal-foot {
    padding: 12px 18px;
    border-top: 1px solid var(--line);
    text-align: right;
  }
  .modal-foot a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; }
  .modal-foot a:hover { text-decoration: underline; }
  .dict-word { font-size: 20px; font-weight: 800; margin: 0 0 12px; }
  .dict-entry { padding: 12px 0; border-top: 1px dashed var(--line); }
  .dict-entry:first-child { border-top: none; padding-top: 0; }
  .dict-def { white-space: pre-wrap; line-height: 1.5; }
  .dict-ex {
    white-space: pre-wrap;
    margin-top: 8px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
    font-style: italic;
    color: var(--muted);
  }
  .dict-status { color: var(--muted); text-align: center; padding: 24px 0; }
  .dict-spinner {
    width: 26px; height: 26px;
    border: 3px solid var(--fill-hover);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 12px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme">
    <span class="track"><span class="knob"></span></span>
    <span class="label" id="themeLabel">Light</span>
  </button>
<div class="wrap">
  <header>
    <h1>🥝 NZ Slang Quiz</h1>
    <p class="subtitle">How fluent is your Kiwi youth slang?</p>
  </header>

  <!-- START SCREEN -->
  <div id="start" class="card">
    <div class="field">
      <label for="category">Category</label>
      <select id="category"></select>
    </div>
    <div class="field">
      <label for="length">Number of questions</label>
      <select id="length">
        <option value="10">10 — quick round</option>
        <option value="20" selected>20 — standard</option>
        <option value="50">50 — marathon</option>
      </select>
    </div>
    <div class="field">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="term2meaning" selected>Guess the meaning of a term</option>
        <option value="meaning2term">Guess the term from a meaning</option>
      </select>
    </div>
    <div class="actions">
      <button class="btn" id="startBtn">Start quiz →</button>
    </div>
    <footer id="poolInfo"></footer>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz" class="card hidden">
    <div class="stats">
      <div class="stat"><div class="num" id="sQ">0</div><div class="lbl">Question</div></div>
      <div class="stat good"><div class="num" id="sR">0</div><div class="lbl">Right</div></div>
      <div class="stat bad"><div class="num" id="sW">0</div><div class="lbl">Wrong</div></div>
    </div>
    <div class="progress"><div id="bar"></div></div>

    <div class="qmeta">
      <span class="chip" id="chip">CATEGORY</span>
      <span class="qnum" id="qnum"></span>
    </div>
    <p class="prompt" id="prompt">What does this mean?</p>
    <h2 class="term" id="term">—</h2>

    <div class="options" id="options"></div>

    <div class="hint" id="hintBox">
      <button class="hint-btn" id="hintBtn" type="button">💡 Stuck? Reveal an example</button>
      <div class="hint-text" id="hintText"><span class="lbl">Example</span><span id="hintExampleText"></span></div>
    </div>

    <div class="reveal" id="reveal">
      <div class="verdict" id="verdict"></div>
      <div class="example" id="example"><span class="lbl">Example</span><span id="exampleText"></span></div>
      <a class="dict-link" id="dictLink" href="#" target="_blank" rel="noopener noreferrer">🔎 Look up “<span id="dictTerm"></span>” in Urban Dictionary</a>
    </div>

    <div class="actions">
      <button class="btn ghost" id="quitBtn">Quit</button>
      <button class="btn" id="nextBtn" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results" class="card hidden">
    <div class="result">
      <div class="big" id="scorePct">0%</div>
      <div class="msg" id="scoreMsg"></div>
      <p class="subtitle" id="scoreDetail"></p>
      <div class="actions" style="margin-top:22px;">
        <button class="btn ghost" id="reviewHomeBtn">Change settings</button>
        <button class="btn" id="againBtn">Play again ↻</button>
      </div>
    </div>
  </div>

  <footer>NZ Youth Slang dataset · built for GitHub Pages</footer>
</div>

<!-- DICTIONARY POPUP -->
<div id="dictModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="dictTitle">
  <div class="modal">
    <div class="modal-head">
      <h3 id="dictTitle">Urban Dictionary</h3>
      <button class="modal-close" id="dictClose" type="button" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="dictBody"></div>
    <div class="modal-foot">
      <a id="dictMore" href="#" target="_blank" rel="noopener noreferrer">Open on Urban Dictionary ↗</a>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
